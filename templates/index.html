<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One AI</title> <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; color: #e3e3e3; background: #050505; position: relative; }
        
        /* Background Effects */
        body::before, body::after { content: ""; position: absolute; width: 150vmax; height: 150vmax; top: -25vmax; left: -25vmax; z-index: -1; opacity: 0.5; filter: blur(100px); pointer-events: none; }
        body::before { background: radial-gradient(circle, rgba(29, 78, 216, 0.15) 0%, transparent 50%); animation: orbit 25s infinite linear; }
        body::after { background: radial-gradient(circle, rgba(31, 41, 55, 0.2) 0%, transparent 50%); animation: orbit 35s infinite linear reverse; }
        @keyframes orbit { from { transform: rotate(0deg) translate(5%, 5%) rotate(0deg); } to { transform: rotate(360deg) translate(5%, 5%) rotate(-360deg); } }

        /* Sidebar */
        #sidebar { width: 280px; min-width: 280px; background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(25px); display: flex; flex-direction: column; padding: 20px 15px; border-right: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s ease; z-index: 50; }
        #sidebar.collapsed { margin-left: -280px; }
        .logo-img { width: 35px; height: 35px; object-fit: contain; mix-blend-mode: screen; filter: brightness(1.2); }

        #new-chat-btn { background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); padding: 12px; border-radius: 25px; cursor: pointer; font-size: 0.9em; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 25px 0 10px 0; transition: 0.2s; }
        #new-chat-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #fff; }

        .recent-label { font-size: 0.75em; color: #fff; margin: 5px 0 10px 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }

        .chat-item-container { position: relative; display: flex; align-items: center; width: 100%; margin-bottom: 5px; }
        .sidebar-btn { flex-grow: 1; background: transparent; color: #e3e3e3; border: none; padding: 12px 45px 12px 12px; border-radius: 8px; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9em; }
        .sidebar-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .dots-btn { position: absolute; right: 10px; background: none; border: none; color: #aaa; cursor: pointer; display: none; font-size: 1.2em; z-index: 60; padding: 5px; }
        .chat-item-container:hover .dots-btn { display: block; }

        .action-menu { position: absolute; top: 40px; right: 10px; background: #25262b; border: 1px solid #444; border-radius: 12px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
        .action-item { background: transparent; color: white; border: none; padding: 12px 20px; text-align: left; cursor: pointer; font-size: 0.85em; width: 100%; transition: 0.2s; }
        .action-item:hover { background: #3c3e42; }

        /* Centered Header */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; box-sizing: border-box; }
        
        .app-title { font-weight: 700; font-size: 1.5em; color: #fff; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
        .app-title span { display: inline-block; }
        .jump { animation: jumpLet 0.6s ease; }
        @keyframes jumpLet { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); color: #a8c7fa; } }
        
        /* Temp Chat Toggle */
        .temp-section { display: flex; align-items: center; gap: 10px; font-size: 0.9em; color: #fff; font-weight: 500; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 20px; transition: 0.4s; border: 1px solid rgba(255,255,255,0.1); }
        .slider:before { content: ""; position: absolute; height: 12px; width: 12px; left: 2px; bottom: 2px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: #a8c7fa; }
        input:checked + .slider:before { transform: translateX(16px); }

        #chat-container { width: 100%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #chat-box { width: 90%; max-width: 800px; padding: 40px 0; display: flex; flex-direction: column; gap: 35px; }
        
        .user-bubble { align-self: flex-end; background: #303134; padding: 15px 25px; border-radius: 25px; max-width: 75%; }
        .ai-wrap { display: flex; gap: 18px; align-items: flex-start; align-self: flex-start; }
        .ai-star { color: #FFD700; font-size: 1.4em; animation: starFade 2s infinite; }
        @keyframes starFade { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Input Area & Tooltips */
        #input-outer { width: 100%; max-width: 800px; padding: 25px; box-sizing: border-box; position: relative; }
        #input-inner { background: #1e1f22; border-radius: 35px; padding: 10px 25px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; position: relative; }
        #input-inner:focus-within { border-color: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.1); }
        input#user-input { flex-grow: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 1.1em; }
        
        .btn-wrap { position: relative; display: flex; align-items: center; }
        .tooltip { position: absolute; bottom: 60px; background: #3c4043; color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.8em; opacity: 0; visibility: hidden; transition: 0.2s; transform: translateY(8px); white-space: nowrap; z-index: 1001; }
        .btn-wrap:hover .tooltip { opacity: 1; visibility: visible; transform: translateY(0); }

        #submit-btn { background: none; border: none; color: #a8c7fa; font-size: 1.8em; cursor: pointer; transition: 0.2s; }
        .arrow-anim { animation: arrowOut 0.5s ease forwards; }
        @keyframes arrowOut { 
            0% { transform: translateX(0); opacity: 1; }
            45% { transform: translateX(45px); opacity: 0; }
            50% { transform: translateX(-45px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .popup-menu { position: absolute; bottom: 85px; left: 0; background: #25262b; border-radius: 18px; display: none; flex-direction: column; padding: 10px; border: 1px solid #444; min-width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 2000; }
        .popup-menu button { background: none; color: white; border: none; padding: 12px 18px; text-align: left; cursor: pointer; border-radius: 10px; width: 100%; transition: 0.2s; }
        .popup-menu button:hover { background: #3c3e42; }

        .f-icon { cursor: pointer; font-size: 1.5em; color: #c4c7c5; padding-right: 15px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="/static/logo.png" alt="Logo" class="logo-img">
        <span style="font-weight:700; font-size:1.2em;">One AI</span>
    </div>

    <button id="new-chat-btn" onclick="newChat()">
        <span>＋</span> New Chat
    </button>
    
    <div class="recent-label">RECENT</div>
    
    <div id="recent-chats-list" style="flex-grow:1; overflow-y:auto"></div>
</div>

<div id="main-content">
    <div class="top-nav">
        <div class="btn-wrap">
            <span style="cursor:pointer; font-size:1.7em; padding: 5px;" onclick="toggleSidebar()">☰</span>
            <div class="tooltip" style="bottom:-40px; left:5px;">Collapse Menu</div>
        </div>
        <div class="app-title" id="animated-title">
            <span>O</span><span>n</span><span>e</span>&nbsp;<span>A</span><span>I</span>
        </div>
        <div class="temp-section">
            Temp Chat <label class="switch"><input type="checkbox" id="temp-mode"><span class="slider"></span></label>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-box"><h2 id="hero" style="text-align:center; margin-top:20vh; opacity:0.8; font-weight: 500; font-size: 2em;">How can I help you?</h2></div>
    </div>

    <div id="input-outer">
        <input type="file" id="real-picker" style="display:none" onchange="handleFilePicked(this)">

        <div id="f-menu" class="popup-menu">
            <button onclick="pick('image/*')">🖼️ Photos</button>
            <button onclick="pick('.pdf,.doc,.docx,.txt')">📄 Documents</button>
            <button onclick="pick('.js,.py,.html,.css,.cpp')">💻 Code</button>
            <button onclick="pick('.csv,.xlsx,.json')">📊 Data</button>
            <button onclick="pick('*')">📁 Browse</button>
        </div>
        <div id="input-inner">
            <div class="btn-wrap">
                <span class="f-icon" onclick="toggleF(event)">📎</span>
                <div class="tooltip" style="left:-10px;">Upload Files</div>
            </div>
            <input type="text" id="user-input" placeholder="Message One AI..." onkeypress="if(event.key==='Enter') send()">
            <div class="btn-wrap">
                <button id="submit-btn" onclick="send()">➔</button>
                <div class="tooltip" style="right:0;">Submit Message</div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentId = null;

    // Title Jump
    function triggerJump() {
        const letters = document.querySelectorAll('#animated-title span');
        letters.forEach((s, i) => {
            setTimeout(() => s.classList.add('jump'), i * 60);
            setTimeout(() => s.classList.remove('jump'), i * 60 + 600);
        });
    }
    setInterval(triggerJump, 60000);
    setTimeout(triggerJump, 1000);

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleF(e) { e.stopPropagation(); const m = document.getElementById('f-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    
    function pick(type) {
        const p = document.getElementById('real-picker');
        p.accept = type;
        p.click();
        document.getElementById('f-menu').style.display='none';
    }
    function handleFilePicked(input) {
        if(input.files[0]) alert("One AI connected to: " + input.files[0].name);
    }

    async function send() {
        const input = document.getElementById('user-input');
        const val = input.value; if(!val) return;
        const btn = document.getElementById('submit-btn');
        btn.classList.add('arrow-anim');
        setTimeout(() => btn.classList.remove('arrow-anim'), 500);
        if(document.getElementById('hero')) document.getElementById('hero').remove();
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="user-bubble">${val}</div>`;
        input.value = '';
        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: val, chat_id: currentId })
        });
        const data = await res.json();
        box.innerHTML += `<div class="ai-wrap"><span class="ai-star">✦</span><div>${marked.parse(data.master_answer)}</div></div>`;
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        if(!currentId && !document.getElementById('temp-mode').checked) { currentId = data.chat_id; loadSidebar(); }
    }

    async function loadChat(id) {
        currentId = id;
        const box = document.getElementById('chat-box');
        box.innerHTML = '<div style="text-align:center; opacity:0.3; margin-top:20vh;">Syncing History...</div>';
        const res = await fetch(`/get_chat/${id}`);
        const msgs = await res.json();
        box.innerHTML = '';
        msgs.forEach(m => {
            if(m.role === 'User') box.innerHTML += `<div class="user-bubble">${m.content}</div>`;
            else box.innerHTML += `<div class="ai-wrap"><span class="ai-star">✦</span><div>${marked.parse(m.content)}</div></div>`;
        });
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    async function renameChat(id) {
        const n = prompt("Enter new title:");
        if(n) {
            await fetch(`/rename_chat/${id}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: n }) });
            loadSidebar();
        }
    }

    async function deleteChat(id) {
        if(confirm("Permanently delete this chat?")) {
            await fetch(`/delete_chat/${id}`, { method: 'DELETE' });
            if(currentId === id) newChat();
            loadSidebar();
        }
    }

    async function loadSidebar() {
        const res = await fetch('/get_chats');
        const chats = await res.json();
        const list = document.getElementById('recent-chats-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const div = document.createElement('div');
            div.className = 'chat-item-container';
            div.innerHTML = `
                <button class="sidebar-btn" onclick="loadChat(${c.id})">💬 ${c.title}</button>
                <button class="dots-btn" onclick="toggleM(event, ${c.id})">⋮</button>
                <div class="action-menu" id="menu-${c.id}">
                    <button class="action-item" onclick="renameChat(${c.id})">✏️ Rename</button>
                    <button class="action-item" onclick="deleteChat(${c.id})">🗑️ Delete</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function toggleM(e, id) { 
        e.stopPropagation(); 
        document.querySelectorAll('.action-menu').forEach(m => m.style.display = 'none'); 
        document.getElementById(`menu-${id}`).style.display = 'flex'; 
    }
    
    function newChat() { currentId = null; document.getElementById('chat-box').innerHTML = '<h2 id="hero" style="text-align:center; margin-top:20vh; opacity:0.8; font-weight: 500; font-size: 2em;">How can I help you?</h2>'; }
    document.addEventListener('click', () => { document.querySelectorAll('.action-menu, .popup-menu').forEach(m => m.style.display = 'none'); });
    loadSidebar();
</script>
</body>
</html>
